name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: marketplace.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: jq syntax
        run: jq empty .claude-plugin/marketplace.json
      - name: Structural sanity
        run: ./scripts/validate-marketplace.sh
